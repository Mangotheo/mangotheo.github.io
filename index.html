<!DOCTYPE html>
<html>
<head>
  <title>Mango Slice ⚡</title>
  <style>
    body {
      margin:0;
      overflow:hidden;
      background:#111;
    }
    #score, #combo {
      position: fixed;
      left: 20px;
      color: white;
      font-weight: bold;
    }
    #score { top: 15px; font-size: 26px; }
    #combo { top: 50px; font-size: 20px; color: cyan; }

    #startBtn {
      position: fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      padding:15px 30px;
      font-size:20px;
      background:orange;
      border:none;
      border-radius:10px;
    }

    canvas { display:block; }
  </style>
</head>
<body>

<div id="score">Score: 0</div>
<div id="combo"></div>
<button id="startBtn">START</button>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let objects=[], particles=[];
let score=0, combo=0;
let running=false;

let mouse={x:0,y:0,px:0,py:0,down:false};

// 🎵 music
const music = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_115b9bce3c.mp3");
music.loop=true;
music.volume=0.4;

document.getElementById("startBtn").onclick=()=>{
  running=true;
  music.play();
  document.getElementById("startBtn").style.display="none";
};

class Obj{
  constructor(type){
    this.x=Math.random()*canvas.width;
    this.y=-50;
    this.vx=(Math.random()-0.5)*4;
    this.vy=4+Math.random()*3;
    this.type=type;
    this.rot=Math.random();
  }

  update(){
    this.vy+=0.3;
    this.x+=this.vx;
    this.y+=this.vy;
    this.rot+=0.1;
    return this.y<canvas.height+50;
  }

  draw(){
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.rot);
    ctx.font="50px serif";
    ctx.fillText(this.type==="fruit"?"🍉":"💣",-20,20);
    ctx.restore();
  }
}

function spawn(){
  objects.push(new Obj(Math.random()<0.85?"fruit":"bomb"));
}
setInterval(spawn,500);

function sliceCheck(o){
  let dx=mouse.x-mouse.px;
  let dy=mouse.y-mouse.py;
  let t=((o.x-mouse.px)*dx+(o.y-mouse.py)*dy)/(dx*dx+dy*dy);
  t=Math.max(0,Math.min(1,t));
  let lx=mouse.px+t*dx;
  let ly=mouse.py+t*dy;
  return Math.hypot(o.x-lx,o.y-ly)<35;
}

function explode(x,y,color){
  for(let i=0;i<60;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*14,
      vy:(Math.random()-0.5)*14,
      life:100,
      color
    });
  }
}

// ☕ DRAW CAFE BACKGROUND
function drawCafe(){
  // wall
  let grad = ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0,"#6d4c41");
  grad.addColorStop(1,"#3e2723");
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // floor
  ctx.fillStyle="#2e1b17";
  ctx.fillRect(0,canvas.height-150,canvas.width,150);

  // tables
  for(let i=0;i<5;i++){
    ctx.fillStyle="#5d4037";
    ctx.fillRect(i*250+50,canvas.height-200,120,20);
  }

  // warm light overlay
  ctx.fillStyle="rgba(255,180,100,0.1)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function update(){
  drawCafe();

  if(running){
    objects = objects.filter(o=>{
      o.update();
      o.draw();

      if(mouse.down && sliceCheck(o)){
        if(o.type==="fruit"){
          score += 1 + combo;
          combo++;
          explode(o.x,o.y,"red");
        } else {
          score=Math.max(0,score-5);
          combo=0;
          explode(o.x,o.y,"black");
        }

        document.getElementById("score").innerText="Score: "+score;
        document.getElementById("combo").innerText= combo>1 ? "COMBO x"+combo : "";
        return false;
      }

      return true;
    });
  }

  particles.forEach((p,i)=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.vy+=0.3;
    p.life--;

    ctx.fillStyle=p.color;
    ctx.globalAlpha=p.life/100;
    ctx.fillRect(p.x,p.y,6,6);
    ctx.globalAlpha=1;

    if(p.life<=0) particles.splice(i,1);
  });

  // glowing katana
  if(mouse.down){
    ctx.strokeStyle="cyan";
    ctx.shadowBlur=20;
    ctx.shadowColor="cyan";
    ctx.lineWidth=5;
    ctx.beginPath();
    ctx.moveTo(mouse.px,mouse.py);
    ctx.lineTo(mouse.x,mouse.y);
    ctx.stroke();
    ctx.shadowBlur=0;
  }

  requestAnimationFrame(update);
}

update();

// TOUCH
canvas.addEventListener("touchstart",(e)=>{
  mouse.down=true;
  let t=e.touches[0];
  mouse.x=mouse.px=t.clientX;
  mouse.y=mouse.py=t.clientY;
});

canvas.addEventListener("touchmove",(e)=>{
  let t=e.touches[0];
  mouse.px=mouse.x;
  mouse.py=mouse.y;
  mouse.x=t.clientX;
  mouse.y=t.clientY;
});

canvas.addEventListener("touchend",()=>mouse.down=false);

// mouse fallback
canvas.addEventListener("mousedown",()=>mouse.down=true);
canvas.addEventListener("mouseup",()=>mouse.down=false);
canvas.addEventListener("mousemove",(e)=>{
  mouse.px=mouse.x;
  mouse.py=mouse.y;
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});
</script>

</body>
</html>
