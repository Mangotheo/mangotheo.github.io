<!DOCTYPE html>
<html>
<head>
<title>Perfect Timing ⚡</title>
<style>
body {
  margin:0;
  overflow:hidden;
  background: radial-gradient(circle, #0f2027, #000);
  font-family: Arial;
}

#score {
  position:fixed;
  top:20px;
  left:20px;
  color:white;
  font-size:28px;
  font-weight:bold;
}

#combo {
  position:fixed;
  top:60px;
  left:20px;
  color:cyan;
  font-size:20px;
}

#feedback {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:40px;
  font-weight:bold;
  color:white;
  opacity:0;
}

canvas { display:block; }
</style>
</head>
<body>

<div id="score">Score: 0</div>
<div id="combo"></div>
<div id="feedback"></div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let pos = 0;
let speed = 0.015;
let dir = 1;

let score = 0;
let combo = 0;

const hitSound = new Audio("https://www.soundjay.com/button/sounds/button-3.mp3");

function drawBar(){
  let centerX = canvas.width/2;
  let width = 300;

  // track
  ctx.fillStyle="#333";
  ctx.fillRect(centerX-width/2, canvas.height/2, width, 10);

  // perfect zone
  ctx.fillStyle="lime";
  ctx.fillRect(centerX-30, canvas.height/2, 60, 10);

  // moving marker
  let x = centerX - width/2 + pos*width;
  ctx.fillStyle="cyan";
  ctx.shadowBlur=20;
  ctx.shadowColor="cyan";
  ctx.fillRect(x-5, canvas.height/2-10, 10, 30);
  ctx.shadowBlur=0;

  return x;
}

function feedback(text,color){
  let el = document.getElementById("feedback");
  el.innerText=text;
  el.style.color=color;
  el.style.opacity=1;

  setTimeout(()=>{ el.style.opacity=0; },300);
}

function tap(){
  let center = canvas.width/2;
  let width = 300;
  let x = center - width/2 + pos*width;

  let dist = Math.abs(x - center);

  hitSound.currentTime=0;
  hitSound.play();

  if(dist < 20){
    score += 3 + combo;
    combo++;
    feedback("PERFECT 🔥","lime");
    screenFlash();
  }
  else if(dist < 50){
    score += 1;
    combo = 0;
    feedback("GOOD","white");
  }
  else{
    combo = 0;
    feedback("MISS ❌","red");
  }

  document.getElementById("score").innerText="Score: "+score;
  document.getElementById("combo").innerText= combo>1 ? "COMBO x"+combo : "";
}

function screenFlash(){
  ctx.fillStyle="rgba(255,255,255,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function update(){
  ctx.fillStyle="rgba(0,0,0,0.3)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  pos += speed * dir;
  if(pos > 1 || pos < 0){
    dir *= -1;
  }

  drawBar();

  requestAnimationFrame(update);
}

update();

// touch
canvas.addEventListener("touchstart", tap);

// mouse
canvas.addEventListener("mousedown", tap);
</script>

</body>
</html>
