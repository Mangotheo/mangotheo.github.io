<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>President Simulator X v2 ⚡️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

#app {
  max-width: 600px;
  margin: auto;
  padding: 15px;
}

h1 { text-align:center; }

.stats {
  background:#111;
  padding:10px;
  border-radius:10px;
}

.bar {
  height:12px;
  background:#333;
  border-radius:10px;
  margin:6px 0;
}

.fill {
  height:100%;
  border-radius:10px;
  transition:0.3s;
}

.money { background:gold; }
.happy { background:lime; }
.mil { background:red; }
.stab { background:cyan; }
.pop { background:orange; }

#messages {
  height:260px;
  overflow-y:auto;
  background:#111;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.msg {
  background:#222;
  padding:10px;
  border-radius:10px;
  margin:5px 0;
}

button {
  width:100%;
  margin:5px 0;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
}

button:hover { background:#45a049; }
</style>
</head>

<body>

<div id="app">
<h1>🌍 PRESIDENT X v2 ⚡️</h1>

<div class="stats">
Day: <span id="day">1</span>

💰 Money <div class="bar"><div id="money" class="fill money"></div></div>
😊 Happiness <div class="bar"><div id="happy" class="fill happy"></div></div>
⚔️ Military <div class="bar"><div id="mil" class="fill mil"></div></div>
🧠 Stability <div class="bar"><div id="stab" class="fill stab"></div></div>
👥 Population <div class="bar"><div id="pop" class="fill pop"></div></div>
</div>

<div id="messages"></div>
<div id="choices"></div>

</div>

<script>
let stats = {
  money:50,
  happy:50,
  mil:50,
  stab:50,
  pop:50
};

let day = 1;

function update(){
  document.getElementById("day").innerText = day;

  for(let k in stats){
    document.getElementById(k).style.width = stats[k]+"%";
  }
}

function msg(t){
  let d=document.createElement("div");
  d.className="msg";
  d.innerText=t;
  messages.appendChild(d);
  messages.scrollTop=9999;
}

function clamp(){
  for(let k in stats){
    stats[k]=Math.max(0,Math.min(100,stats[k]));
  }
}

function gameOver(){
  if(stats.stab<=0){
    msg("💀 Government collapsed.");
    setTimeout(()=>location.reload(),2000);
  }
}

function random(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function createEvent(){

  let type = random(1,5);

  let text="";
  let choices=[];

  if(type===1){
    text="📢 Citizens demand better living conditions!";
    choices=[
      {t:"Increase funding", e:()=>{stats.money-=10;stats.happy+=15}},
      {t:"Ignore", e:()=>{stats.happy-=10;stats.stab-=5}},
      {t:"Tax rich", e:()=>{stats.money+=15;stats.happy+=5}},
      {t:"Force control", e:()=>{stats.mil+=5;stats.happy-=15}}
    ];
  }

  if(type===2){
    text="⚔️ Border tension rising!";
    choices=[
      {t:"Prepare army", e:()=>{stats.mil+=15;stats.money-=10}},
      {t:"Negotiate", e:()=>{stats.stab+=10}},
      {t:"Ignore", e:()=>{stats.stab-=10}},
      {t:"Spy operation", e:()=>{stats.mil+=5;stats.stab+=5}}
    ];
  }

  if(type===3){
    text="💰 Economic opportunity appears!";
    choices=[
      {t:"Invest big", e:()=>{stats.money+=20;stats.stab-=5}},
      {t:"Small invest", e:()=>{stats.money+=10}},
      {t:"Ignore", e:()=>{stats.money-=5}},
      {t:"Corruption", e:()=>{stats.money+=25;stats.happy-=20}}
    ];
  }

  if(type===4){
    text="🌪️ Natural disaster hits!";
    choices=[
      {t:"Help citizens", e:()=>{stats.money-=15;stats.happy+=15}},
      {t:"Ignore", e:()=>{stats.pop-=15;stats.stab-=10}},
      {t:"Military aid", e:()=>{stats.mil-=5;stats.stab+=5}},
      {t:"Take advantage", e:()=>{stats.money+=10;stats.happy-=15}}
    ];
  }

  if(type===5){
    text="🧠 Political scandal exposed!";
    choices=[
      {t:"Deny", e:()=>{stats.stab-=10}},
      {t:"Apologize", e:()=>{stats.happy+=5;stats.stab+=5}},
      {t:"Blame others", e:()=>{stats.stab-=5;stats.mil+=5}},
      {t:"Cover up", e:()=>{stats.money-=10;stats.stab+=10}}
    ];
  }

  msg(text);

  let cdiv=document.getElementById("choices");
  cdiv.innerHTML="";

  choices.forEach(c=>{
    let b=document.createElement("button");
    b.innerText=c.t;

    b.onclick=()=>{
      c.e();

      // RANDOM EFFECT
      let chaos=random(0,1);
      if(chaos){
        let k=Object.keys(stats)[random(0,4)];
        let change=random(-10,10);
        stats[k]+=change;
        msg("⚠️ Unexpected effect: "+k+" "+(change>0?"+":"")+change);
      }

      clamp();
      update();
      gameOver();

      day++;
      setTimeout(createEvent,500);
    };

    cdiv.appendChild(b);
  });

}

update();
msg("👑 Welcome President. Lead wisely...");
setTimeout(createEvent,1000);

</script>

</body>
</html>
