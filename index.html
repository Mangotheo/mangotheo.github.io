<!DOCTYPE html>
<html>
<head>
<title>Luna Life RP ⚡</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; background:#111; }

/* UI */
#topUI {
  position:fixed;
  top:10px;
  left:10px;
  color:white;
  font-size:18px;
}

#dialogue {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.8);
  padding:15px;
  border-radius:10px;
  color:white;
  display:none;
}

#shop {
  position:fixed;
  bottom:100px;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  padding:10px;
  border-radius:10px;
  display:none;
}

.btn {
  background:#444;
  padding:10px;
  margin:5px;
  color:white;
  border-radius:8px;
}

/* joystick */
#joy {
  position:fixed;
  bottom:30px;
  left:30px;
  width:120px;
  height:120px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
}

#stick {
  width:50px;
  height:50px;
  background:rgba(255,255,255,0.5);
  border-radius:50%;
  position:absolute;
  left:35px;
  top:35px;
}

canvas { display:block; }
</style>
</head>
<body>

<div id="topUI">
💰 $<span id="money">100</span><br>
🎯 <span id="mission">Talk to NPC</span>
</div>

<div id="dialogue"></div>

<div id="shop">
  <div class="btn" onclick="buy('Lamp',50)">💡 Lamp - $50</div>
  <div class="btn" onclick="closeShop()">Close</div>
</div>

<div id="joy"><div id="stick"></div></div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

/* GAME STATE */
let money=100;
let inventory=[];
let scene="city";
let mission=0;

let player={x:300,y:300,vx:0,vy:0};
let camera={x:0,y:0};

let npc={x:700,y:500};

let home={x:200,y:1200,w:250,h:200};
let mall={x:1300,y:700,w:300,h:200};

/* JOYSTICK */
let joy=document.getElementById("joy");
let stick=document.getElementById("stick");
let dragging=false;

joy.addEventListener("touchstart",()=>dragging=true);
joy.addEventListener("touchend",()=>{dragging=false;player.vx=0;player.vy=0;stick.style.left="35px";stick.style.top="35px";});
joy.addEventListener("touchmove",(e)=>{
  if(!dragging)return;
  let t=e.touches[0];
  let rect=joy.getBoundingClientRect();
  let x=t.clientX-rect.left-60;
  let y=t.clientY-rect.top-60;

  let dist=Math.hypot(x,y);
  if(dist>40){x*=40/dist;y*=40/dist;}

  stick.style.left=(x+35)+"px";
  stick.style.top=(y+35)+"px";

  player.vx=x/10;
  player.vy=y/10;
});

/* UI */
function showDialogue(text){
  let d=document.getElementById("dialogue");
  d.innerText=text;
  d.style.display="block";
  setTimeout(()=>d.style.display="none",2000);
}

function updateUI(){
  document.getElementById("money").innerText=money;
  const missions=["Talk to NPC","Go Mall","Buy Item","Go Home","Place Item"];
  document.getElementById("mission").innerText=missions[mission]||"Free Play";
}

/* SHOP */
function buy(name,price){
  if(money>=price){
    money-=price;
    inventory.push(name);
    mission=3;
    showDialogue("Bought "+name);
    closeShop();
  }
  updateUI();
}

function closeShop(){
  document.getElementById("shop").style.display="none";
}

/* GAME LOOP */
function update(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  player.x+=player.vx;
  player.y+=player.vy;

  camera.x=player.x-canvas.width/2;
  camera.y=player.y-canvas.height/2;

  ctx.save();
  ctx.translate(-camera.x,-camera.y);

  // ground
  ctx.fillStyle="#4caf50";
  ctx.fillRect(0,0,2000,2000);

  // mall
  ctx.fillStyle="#ffcc00";
  ctx.fillRect(mall.x,mall.y,mall.w,mall.h);
  ctx.fillStyle="black";
  ctx.fillText("MALL",mall.x+80,mall.y+100);

  // home
  ctx.fillStyle="#2196f3";
  ctx.fillRect(home.x,home.y,home.w,home.h);
  ctx.fillStyle="white";
  ctx.fillText("HOME",home.x+70,home.y+100);

  // npc
  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(npc.x,npc.y,15,0,Math.PI*2);
  ctx.fill();

  // player
  ctx.fillStyle="cyan";
  ctx.beginPath();
  ctx.arc(player.x,player.y,15,0,Math.PI*2);
  ctx.fill();

  // arrow guide
  let target= npc;
  if(mission>=1) target=mall;
  if(mission>=3) target=home;

  let dx=target.x-player.x;
  let dy=target.y-player.y;
  let angle=Math.atan2(dy,dx);

  ctx.save();
  ctx.translate(player.x,player.y);
  ctx.rotate(angle);
  ctx.fillStyle="white";
  ctx.fillRect(20,-5,20,10);
  ctx.restore();

  ctx.restore();

  requestAnimationFrame(update);
}
update();

/* INTERACTION */
canvas.addEventListener("touchend",()=>{
  let d=Math.hypot(player.x-npc.x,player.y-npc.y);

  if(d<80 && mission===0){
    mission=1;
    showDialogue("Go to Mall 🛍️");
  }

  if(player.x>mall.x && player.x<mall.x+mall.w && player.y>mall.y && player.y<mall.y+mall.h){
    if(mission===1){
      mission=2;
      document.getElementById("shop").style.display="block";
    }
  }

  if(player.x>home.x && player.x<home.x+home.w && player.y>home.y && player.y<home.y+home.h){
    if(mission===3){
      mission=4;
      showDialogue("Placed Item 🪑");
      money+=100;
    }
  }

  updateUI();
});
updateUI();
</script>

</body>
</html>
