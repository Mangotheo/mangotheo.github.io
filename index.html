<!DOCTYPE html>
<html>
<head>
<title>Neon Survivor ⚡</title>
<style>
body {
  margin:0;
  overflow:hidden;
  background:#050505;
}

#score {
  position:fixed;
  top:20px;
  left:20px;
  color:#0ff;
  font-size:24px;
  font-family:Arial;
}

canvas { display:block; }
</style>
</head>
<body>

<div id="score">Time: 0</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let player = {x:canvas.width/2, y:canvas.height/2};
let target = {x:player.x, y:player.y};

let enemies = [];
let time = 0;

// 🎯 TOUCH = MOVEMENT
canvas.addEventListener("touchstart", move);
canvas.addEventListener("touchmove", move);

function move(e){
  let t = e.touches[0];
  target.x = t.clientX;
  target.y = t.clientY;
}

// spawn enemies
function spawnEnemy(){
  enemies.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    speed:1.2 + Math.random()
  });
}
setInterval(spawnEnemy, 700);

// glow
function glowCircle(x,y,r,color){
  ctx.shadowBlur=20;
  ctx.shadowColor=color;
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fill();
  ctx.shadowBlur=0;
}

function update(){
  ctx.fillStyle="rgba(0,0,0,0.3)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // smooth follow (feels GOOD)
  player.x += (target.x - player.x)*0.1;
  player.y += (target.y - player.y)*0.1;

  glowCircle(player.x,player.y,10,"cyan");

  enemies.forEach((e)=>{
    let dx = player.x - e.x;
    let dy = player.y - e.y;
    let dist = Math.hypot(dx,dy);

    e.x += dx/dist * e.speed;
    e.y += dy/dist * e.speed;

    glowCircle(e.x,e.y,10,"red");

    if(dist < 15){
      alert("Game Over! Time: "+Math.floor(time));
      location.reload();
    }
  });

  time += 0.016;
  document.getElementById("score").innerText = "Time: " + Math.floor(time);

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
