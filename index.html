<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Joseph Battle Game ⚡️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
  color: white;
  text-align: center;
}

h1 { margin-top: 20px; }

.game-box {
  margin: 20px auto;
  padding: 20px;
  width: 320px;
  background: #222;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(255,255,255,0.1);
}

button {
  padding: 10px 20px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  background: #ff3c78;
  color: white;
  cursor: pointer;
}

button:hover { background: #ff0055; }

.bar {
  height: 15px;
  background: #444;
  border-radius: 10px;
  margin: 5px 0;
}

.fill {
  height: 100%;
  background: lime;
  border-radius: 10px;
}

.enemy { background: red; }
</style>
</head>

<body>

<h1>⚡️ Joseph Battle ⚡️</h1>

<div class="game-box">

<p>Level: <span id="level">1</span></p>
<p>Score: <span id="score">0</span></p>
<p>Coins: <span id="coins">0</span></p>

<h3>❤️ You</h3>
<div class="bar"><div id="playerHP" class="fill"></div></div>
<p id="playerText">100</p>

<h3>👾 Enemy</h3>
<div class="bar"><div id="enemyHP" class="fill enemy"></div></div>
<p id="enemyText">100</p>

<button onclick="attack()">Attack 💥</button>
<button onclick="heal()">Heal ❤️ (10 coins)</button>
<button onclick="rage()">Rage ⚡ (20 coins)</button>

<h3>🛒 Shop</h3>
<button onclick="upgradeDamage()">+Damage (15 coins)</button>

</div>

<script>
let playerMax = 100;
let playerHP = 100;
let enemyMax = 100;
let enemyHP = 100;

let damage = 10;
let level = 1;
let score = 0;
let coins = 0;

function updateUI() {
  document.getElementById("playerHP").style.width = (playerHP/playerMax*100)+"%";
  document.getElementById("enemyHP").style.width = (enemyHP/enemyMax*100)+"%";

  document.getElementById("playerText").innerText = playerHP;
  document.getElementById("enemyText").innerText = enemyHP;

  document.getElementById("level").innerText = level;
  document.getElementById("score").innerText = score;
  document.getElementById("coins").innerText = coins;
}

function attack() {
  let dmg = Math.floor(Math.random()*damage)+5;
  enemyHP -= dmg;

  if(enemyHP <= 0){
    coins += 10;
    score += 100;
    level++;

    enemyMax += 30;
    enemyHP = enemyMax;

    alert("Enemy defeated 😈");
  }

  updateUI();
  saveGame();
}

function heal() {
  if(coins >= 10){
    coins -= 10;
    playerHP += 30;
    if(playerHP > playerMax) playerHP = playerMax;
  }
  updateUI();
  saveGame();
}

function rage() {
  if(coins >= 20){
    coins -= 20;
    enemyHP -= 50;
  }
  updateUI();
  saveGame();
}

function upgradeDamage() {
  if(coins >= 15){
    coins -= 15;
    damage += 5;
  }
  updateUI();
  saveGame();
}

function enemyAttack(){
  let dmg = Math.floor(Math.random()*8)+5;
  playerHP -= dmg;

  if(playerHP <= 0){
    alert("YOU DIED 💀");
    localStorage.clear();
    location.reload();
  }

  updateUI();
}

setInterval(enemyAttack, 1500);

function saveGame(){
  localStorage.setItem("game", JSON.stringify({
    playerHP, playerMax, enemyHP, enemyMax,
    damage, level, score, coins
  }));
}

function loadGame(){
  let data = localStorage.getItem("game");
  if(data){
    let g = JSON.parse(data);
    playerHP=g.playerHP;
    playerMax=g.playerMax;
    enemyHP=g.enemyHP;
    enemyMax=g.enemyMax;
    damage=g.damage;
    level=g.level;
    score=g.score;
    coins=g.coins;
  }
}

loadGame();
updateUI();
</script>

</body>
</html>
