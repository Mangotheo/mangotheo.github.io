<!DOCTYPE html>
<html>
<head>
  <title>Mango Slice ⚡</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(#d7ccc8, #8d6e63);
    }
    canvas { display:block; }
    #score {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 24px;
      font-weight: bold;
      color: black;
    }
  </style>
</head>
<body>

<div id="score">Score: 0</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let objects = [];
let particles = [];
let score = 0;

let mouse = {x:0,y:0,px:0,py:0,down:false};

class Obj {
  constructor(type){
    this.x = Math.random()*canvas.width;
    this.y = -50;
    this.vx = (Math.random()-0.5)*3;
    this.vy = 3 + Math.random()*2;
    this.size = 40;
    this.type = type;
    this.rotation = Math.random()*Math.PI;
  }

  update(){
    this.vy += 0.2;
    this.x += this.vx;
    this.y += this.vy;
    this.rotation += 0.05;
    return this.y < canvas.height + 50;
  }

  draw(){
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.rotation);
    ctx.font = this.size + "px serif";

    if(this.type==="fruit"){
      ctx.fillText("🍉",-20,20);
    } else {
      ctx.fillText("💣",-20,20);
    }

    ctx.restore();
  }
}

function spawn(){
  let type = Math.random()<0.8 ? "fruit" : "bomb";
  objects.push(new Obj(type));
}
setInterval(spawn, 800);

canvas.addEventListener("mousedown",()=>mouse.down=true);
canvas.addEventListener("mouseup",()=>mouse.down=false);
canvas.addEventListener("mousemove",(e)=>{
  mouse.px = mouse.x;
  mouse.py = mouse.y;
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

function lineHitsCircle(x1,y1,x2,y2,cx,cy,r){
  let dx = x2-x1;
  let dy = y2-y1;
  let t = ((cx-x1)*dx + (cy-y1)*dy)/(dx*dx+dy*dy);
  t = Math.max(0,Math.min(1,t));
  let lx = x1 + t*dx;
  let ly = y1 + t*dy;
  let dist = Math.hypot(lx-cx, ly-cy);
  return dist < r;
}

function explode(x,y,color){
  for(let i=0;i<20;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*8,
      vy:(Math.random()-0.5)*8,
      life:60,
      color
    });
  }
}

function update(){
  ctx.fillStyle="rgba(255,255,255,0.15)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  objects = objects.filter(o=>{
    o.update();
    o.draw();

    if(mouse.down && lineHitsCircle(mouse.px,mouse.py,mouse.x,mouse.y,o.x,o.y,30)){
      
      if(o.type==="fruit"){
        score++;
        explode(o.x,o.y,"red");
      } else {
        score = Math.max(0, score-2);
        explode(o.x,o.y,"black");
      }

      document.getElementById("score").innerText="Score: "+score;
      return false;
    }

    return o.y < canvas.height;
  });

  particles.forEach((p,i)=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.vy+=0.2;
    p.life--;

    ctx.fillStyle=p.color;
    ctx.globalAlpha=p.life/60;
    ctx.fillRect(p.x,p.y,5,5);
    ctx.globalAlpha=1;

    if(p.life<=0) particles.splice(i,1);
  });

  if(mouse.down){
    ctx.strokeStyle="white";
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(mouse.px,mouse.py);
    ctx.lineTo(mouse.x,mouse.y);
    ctx.stroke();
  }

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
