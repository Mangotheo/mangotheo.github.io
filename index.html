<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>President Simulator 🌍</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0a0a0a, #1c1c1c);
  color: white;
  text-align: center;
}

.screen { display: none; padding: 20px; }
.active { display: block; }

button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  background: #4CAF50;
  color: white;
  cursor: pointer;
}

button:hover { background: #45a049; }

.card {
  background: #222;
  padding: 20px;
  margin: 20px auto;
  width: 300px;
  border-radius: 15px;
}

.stat { margin: 10px 0; }

</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">
  <h1>🌍 President Simulator</h1>
  <button onclick="startStory()">Story Mode 📖</button>
  <button onclick="goCountry()">Free Play 🌐</button>
</div>

<!-- COUNTRY SELECT -->
<div id="country" class="screen">
  <h2>Choose Country</h2>
  <button onclick="selectCountry('USA')">USA 🇺🇸</button>
  <button onclick="selectCountry('UK')">UK 🇬🇧</button>
  <button onclick="selectCountry('Japan')">Japan 🇯🇵</button>

  <h3>Custom Country</h3>
  <input id="customName" placeholder="Enter name">
  <button onclick="createCustom()">Create ✍️</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

  <h2 id="countryName"></h2>

  <div class="card">
    <p class="stat">💰 Economy: <span id="eco">50</span></p>
    <p class="stat">😊 Happiness: <span id="happy">50</span></p>
    <p class="stat">⚔️ Military: <span id="mil">50</span></p>
  </div>

  <div class="card">
    <p id="eventText">Welcome, President.</p>
    <button onclick="choice(1)">Option 1</button>
    <button onclick="choice(2)">Option 2</button>
  </div>

</div>

<script>
let eco = 50;
let happy = 50;
let mil = 50;

let currentEvent = 0;
let country = "";

const events = [
  {
    text: "Your people demand lower taxes.",
    c1: () => { eco -= 10; happy += 10; },
    c2: () => { eco += 10; happy -= 10; }
  },
  {
    text: "Neighbor country is threatening you.",
    c1: () => { mil += 10; eco -= 5; },
    c2: () => { happy += 5; mil -= 5; }
  },
  {
    text: "Economic crisis hits!",
    c1: () => { eco += 15; happy -= 10; },
    c2: () => { eco -= 5; happy += 5; }
  }
];

function show(screen){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(screen).classList.add('active');
}

function startStory(){
  show("country");
}

function goCountry(){
  show("country");
}

function selectCountry(name){
  country = name;
  startGame();
}

function createCustom(){
  let name = document.getElementById("customName").value;
  if(name){
    country = name;
    startGame();
  }
}

function startGame(){
  document.getElementById("countryName").innerText = "President of " + country;
  show("game");
  nextEvent();
}

function nextEvent(){
  let e = events[currentEvent];
  document.getElementById("eventText").innerText = e.text;
}

function choice(num){
  let e = events[currentEvent];

  if(num === 1) e.c1();
  else e.c2();

  updateStats();

  currentEvent++;
  if(currentEvent >= events.length){
    alert("End of demo 👀 more coming...");
    currentEvent = 0;
  }

  nextEvent();
}

function updateStats(){
  document.getElementById("eco").innerText = eco;
  document.getElementById("happy").innerText = happy;
  document.getElementById("mil").innerText = mil;
}
</script>

</body>
</html>
