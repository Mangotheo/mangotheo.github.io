<!DOCTYPE html>
<html>
<head>
<title>Mango Slice ⚡</title>
<style>
body { margin:0; overflow:hidden; background:#2e1b17; }
#score {
  position:fixed; top:15px; left:20px;
  color:white; font-size:26px; font-weight:bold;
}
canvas { display:block; }
</style>
</head>
<body>

<div id="score">Score: 0</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let objects=[], particles=[];
let score=0;

// 🔊 sound fix
let sliceSound = new Audio("https://www.soundjay.com/sword/sounds/sword-1.mp3");

// unlock sound on first tap
document.body.addEventListener("touchstart", ()=>{
  sliceSound.play().then(()=>sliceSound.pause());
}, {once:true});

// 🎨 background
function drawBG(){
  let g = ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,"#6d4c41");
  g.addColorStop(1,"#2e1b17");
  ctx.fillStyle=g;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// 🍉 objects
class Obj{
  constructor(type){
    this.x=Math.random()*canvas.width;
    this.y=-50;
    this.vx=(Math.random()-0.5)*4;
    this.vy=5;
    this.type=type;
    this.rot=Math.random();
  }

  update(){
    this.vy+=0.3;
    this.x+=this.vx;
    this.y+=this.vy;
    this.rot+=0.1;
    return this.y<canvas.height+50;
  }

  draw(){
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.rot);
    ctx.font="50px serif";
    ctx.fillText(this.type==="fruit"?"🍉":"💣",-20,20);
    ctx.restore();
  }
}

// spawn FAST (no boring)
setInterval(()=>{
  objects.push(new Obj(Math.random()<0.85?"fruit":"bomb"));
},400);

// swipe
let mouse={x:0,y:0,px:0,py:0,down:false};

function hit(o){
  let dx=mouse.x-mouse.px;
  let dy=mouse.y-mouse.py;
  let t=((o.x-mouse.px)*dx+(o.y-mouse.py)*dy)/(dx*dx+dy*dy);
  t=Math.max(0,Math.min(1,t));
  let lx=mouse.px+t*dx;
  let ly=mouse.py+t*dy;
  return Math.hypot(o.x-lx,o.y-ly)<35;
}

// explosion
function explode(x,y,color){
  for(let i=0;i<40;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*10,
      vy:(Math.random()-0.5)*10,
      life:80,
      color
    });
  }
}

function update(){
  drawBG();

  objects = objects.filter(o=>{
    o.update();
    o.draw();

    if(mouse.down && hit(o)){
      if(o.type==="fruit"){
        score++;
        explode(o.x,o.y,"red");
        sliceSound.currentTime=0;
        sliceSound.play();
      } else {
        score=Math.max(0,score-3);
        explode(o.x,o.y,"black");
      }

      document.getElementById("score").innerText="Score: "+score;
      return false;
    }

    return true;
  });

  particles.forEach((p,i)=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.vy+=0.3;
    p.life--;

    ctx.fillStyle=p.color;
    ctx.globalAlpha=p.life/80;
    ctx.fillRect(p.x,p.y,5,5);
    ctx.globalAlpha=1;

    if(p.life<=0) particles.splice(i,1);
  });

  // katana
  if(mouse.down){
    ctx.strokeStyle="cyan";
    ctx.lineWidth=4;
    ctx.beginPath();
    ctx.moveTo(mouse.px,mouse.py);
    ctx.lineTo(mouse.x,mouse.y);
    ctx.stroke();
  }

  requestAnimationFrame(update);
}

update();

// touch
canvas.addEventListener("touchstart",(e)=>{
  mouse.down=true;
  let t=e.touches[0];
  mouse.x=mouse.px=t.clientX;
  mouse.y=mouse.py=t.clientY;
});

canvas.addEventListener("touchmove",(e)=>{
  let t=e.touches[0];
  mouse.px=mouse.x;
  mouse.py=mouse.y;
  mouse.x=t.clientX;
  mouse.y=t.clientY;
});

canvas.addEventListener("touchend",()=>mouse.down=false);

// mouse
canvas.addEventListener("mousedown",()=>mouse.down=true);
canvas.addEventListener("mouseup",()=>mouse.down=false);
canvas.addEventListener("mousemove",(e)=>{
  mouse.px=mouse.x;
  mouse.py=mouse.y;
  mouse.x=e.clientX;
  mouse.y=e.clientY;
});
</script>

</body>
</html>
