<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>President Simulator X ⚡️</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

#app {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

.header {
  font-size: 24px;
  text-align: center;
  margin-bottom: 10px;
}

.stats {
  background: #111;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.bar {
  height: 10px;
  background: #333;
  border-radius: 10px;
  margin: 5px 0;
}

.fill {
  height: 100%;
  border-radius: 10px;
}

#messages {
  height: 250px;
  overflow-y: auto;
  background: #111;
  padding: 10px;
  border-radius: 10px;
}

.msg {
  background: #222;
  padding: 10px;
  border-radius: 10px;
  margin: 5px 0;
}

.choice {
  display: block;
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #4CAF50;
  color: white;
  cursor: pointer;
}

.choice:hover { background: #45a049; }
</style>
</head>

<body>

<div id="app">

<div class="header">🌍 PRESIDENT X ⚡️</div>

<div class="stats">
  💰 Money <div class="bar"><div id="moneyBar" class="fill"></div></div>
  😊 Happiness <div class="bar"><div id="happyBar" class="fill"></div></div>
  ⚔️ Military <div class="bar"><div id="milBar" class="fill"></div></div>
  🧠 Stability <div class="bar"><div id="stabBar" class="fill"></div></div>
</div>

<div id="messages"></div>

<div id="choices"></div>

</div>

<script>
let stats = {
  money: 50,
  happy: 50,
  mil: 50,
  stab: 50
};

function updateBars(){
  document.getElementById("moneyBar").style.width = stats.money+"%";
  document.getElementById("happyBar").style.width = stats.happy+"%";
  document.getElementById("milBar").style.width = stats.mil+"%";
  document.getElementById("stabBar").style.width = stats.stab+"%";
}

function addMessage(text){
  let div = document.createElement("div");
  div.className = "msg";
  div.innerText = text;
  document.getElementById("messages").appendChild(div);
  document.getElementById("messages").scrollTop = 9999;
}

function clamp(){
  for(let k in stats){
    if(stats[k] > 100) stats[k] = 100;
    if(stats[k] < 0) stats[k] = 0;
  }
}

function gameOver(){
  if(stats.stab <= 0){
    addMessage("💀 Your country collapsed.");
    setTimeout(()=>location.reload(),2000);
  }
}

function randomEvent(){
  let events = [

    {
      text: "Riots are spreading in the capital!",
      choices: [
        {t:"Send military", e:()=>{stats.mil+=5; stats.happy-=15; stats.stab+=5}},
        {t:"Negotiate", e:()=>{stats.happy+=10; stats.stab+=5}},
        {t:"Ignore", e:()=>{stats.stab-=10}}
      ]
    },

    {
      text: "Foreign country offers alliance.",
      choices: [
        {t:"Accept", e:()=>{stats.mil+=10; stats.money+=5}},
        {t:"Reject", e:()=>{stats.stab+=5}},
        {t:"Demand money", e:()=>{stats.money+=15; stats.stab-=5}}
      ]
    },

    {
      text: "Economic boom opportunity!",
      choices: [
        {t:"Invest heavily", e:()=>{stats.money+=20; stats.happy-=5}},
        {t:"Play safe", e:()=>{stats.money+=10}},
        {t:"Ignore", e:()=>{stats.money-=5}}
      ]
    }

  ];

  let e = events[Math.floor(Math.random()*events.length)];
  addMessage("📢 " + e.text);

  let choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  e.choices.forEach(c=>{
    let btn = document.createElement("button");
    btn.className = "choice";
    btn.innerText = c.t;
    btn.onclick = ()=>{
      c.e();

      // RANDOM CHAOS EFFECT 😈
      let chaos = Math.random();
      if(chaos > 0.7){
        let penalty = Math.floor(Math.random()*10);
        stats.stab -= penalty;
        addMessage("⚠️ Unexpected consequence! -" + penalty + " stability");
      }

      clamp();
      updateBars();
      gameOver();

      setTimeout(randomEvent, 1000);
    };
    choicesDiv.appendChild(btn);
  });
}

updateBars();
addMessage("👑 Welcome President. Your country awaits...");
setTimeout(randomEvent, 1000);

</script>

</body>
</html>
